#Log per-namespace power counts after each data reload.
#Useful for addon and datapack authors debugging load issues.
debug_power_loading = false
#Hide hunger / air HUD bars for origins that don't consume them
#(e.g. Automaton hunger, Merling / Kraken / Automaton air).
#Turn off to keep vanilla bars visible regardless of origin.
hide_hud_bars = true

#Enable or disable built-in origins.
#Set to false to remove an origin from the selection screen.
#Datapack and originpack origins are not affected by these toggles.
[origins]
	human = true
	merling = true
	avian = true
	blazeling = true
	elytrian = true
	enderian = true
	arachnid = true
	shulk = true
	phantom = true
	feline = true
